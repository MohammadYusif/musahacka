services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: musahacka
      POSTGRES_PASSWORD: musahacka
      POSTGRES_DB: musahacka
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musahacka"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://musahacka:musahacka@db:5432/musahacka
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
